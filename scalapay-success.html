<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento completato - Top Phone Torre</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #0288D1, #01579B); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: white; border-radius: 24px; padding: 48px 32px; max-width: 420px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .icon { width: 80px; height: 80px; background: #4CAF50; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .icon svg { width: 40px; height: 40px; }
  h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 12px; }
  p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
  .badge { display: inline-block; background: #f0f0f0; padding: 8px 16px; border-radius: 20px; font-size: 14px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Pagamento completato!</h1>
    <p>Il tuo ordine è stato confermato. Torna all'app <b>Top Phone Torre</b> per vedere i dettagli nella sezione "Ordini".</p>
    <div class="badge">📱 Puoi chiudere questa pagina</div>
  </div>
</body>
</html>
